kind = "web"
previewPath = "/"
title = "Snake & Ladder – Explanation Text Game"
version = "1.0.0"
id = "artifacts/ular-tangga"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21981

[services.development]
run = "pnpm --filter @workspace/ular-tangga run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ular-tangga", "run", "build" ]
publicDir = "artifacts/ular-tangga/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21981"
BASE_PATH = "/"
